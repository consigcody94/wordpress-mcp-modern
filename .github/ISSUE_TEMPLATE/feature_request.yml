name: Feature request
description: Suggest a new tool, resource, prompt, or improvement
labels: [ enhancement ]
body:
  - type: textarea
    id: problem
    attributes:
      label: What do you want to do that you currently can't?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: E.g. a new MCP tool with its inputs/outputs, or a change to an existing one.
