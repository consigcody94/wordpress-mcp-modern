name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.0', '8.3' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Validate composer.json and composer.lock
        run: composer validate --no-check-publish

      - name: PHP syntax check
        run: |
          find . -path ./vendor -prune -o -path ./node_modules -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null
          echo "All PHP files pass syntax check on PHP ${{ matrix.php }}."

  plugin-check:
    name: Plugin Check (wp.org readiness)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install production dependencies
        run: docker run --rm -v "$PWD":/app -w /app composer:2 install --no-dev --no-interaction --no-progress

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Start WordPress environment
        run: npx --yes @wordpress/env start

      - name: Install Plugin Check
        run: npx --yes @wordpress/env run cli wp plugin install plugin-check --activate

      # Errors gate the build; warnings are advisory. Excluded: trademarks
      # (the rename for directory submission is a maintainer call), vendor
      # (third-party libraries reviewed upstream), and non-shipping dirs.
      - name: Run plugin check
        run: |
          npx --yes @wordpress/env run cli wp plugin check wordpress-mcp-modern \
            --ignore-warnings \
            --exclude-checks=trademarks \
            --exclude-directories=docs,tests,vendor,node_modules

  test:
    name: PHPUnit (wp-env)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Composer dependencies
        run: docker run --rm -v "$PWD":/app -w /app composer:2 install --no-interaction --no-progress

      - name: Start WordPress environment
        run: npx --yes @wordpress/env start

      - name: Run PHPUnit
        run: npx --yes @wordpress/env run tests-cli --env-cwd=wp-content/plugins/wordpress-mcp-modern vendor/bin/phpunit
