name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.0', '8.3' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Validate composer.json and composer.lock
        run: composer validate --no-check-publish

      - name: PHP syntax check
        run: |
          find . -path ./vendor -prune -o -path ./node_modules -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null
          echo "All PHP files pass syntax check on PHP ${{ matrix.php }}."

  plugin-check:
    name: Plugin Check (wp.org readiness)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install production dependencies
        run: docker run --rm -v "$PWD":/app -w /app composer:2 install --no-dev --no-interaction --no-progress

      # With a .wp-env.json present the action tries to reuse that (not
      # running / version-mismatched) environment. Hide it so the action
      # provisions its own, as it does for plugins without one.
      - name: Hide .wp-env.json from the action
        run: mv .wp-env.json .wp-env.json.ci-hidden

      - name: Run plugin check
        uses: WordPress/plugin-check-action@v1
        with:
          # Errors gate the build; warnings are advisory. The trademarks check
          # is excluded: renaming for directory submission is a maintainer call.
          ignore-warnings: true
          exclude-checks: trademarks
          exclude-directories: docs,tests

  test:
    name: PHPUnit (wp-env)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Composer dependencies
        run: docker run --rm -v "$PWD":/app -w /app composer:2 install --no-interaction --no-progress

      - name: Start WordPress environment
        run: npx --yes @wordpress/env start

      - name: Run PHPUnit
        run: npx --yes @wordpress/env run tests-cli --env-cwd=wp-content/plugins/wordpress-mcp-modern vendor/bin/phpunit
