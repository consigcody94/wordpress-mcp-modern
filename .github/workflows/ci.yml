name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    name: PHPUnit (wp-env)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Composer dependencies
        run: docker run --rm -v "$PWD":/app -w /app composer:2 install --no-interaction --no-progress

      - name: Start WordPress environment
        run: npx --yes @wordpress/env start

      - name: Run PHPUnit
        run: npx --yes @wordpress/env run tests-cli --env-cwd=wp-content/plugins/wordpress-mcp-modern vendor/bin/phpunit
